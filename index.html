<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>151 Trading Strategies — Interactive Guide</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');

  :root {
    --navy: #1E2761;
    --navy-dark: #0D1340;
    --ice: #CADBFC;
    --gold: #F4BF5F;
    --gold-dark: #c9932a;
    --white: #FFFFFF;
    --bg: #F4F6FF;
    --card: #FFFFFF;
    --text: #1A1A2E;
    --muted: #64749B;
    --green: #1a9e5c;
    --red: #C0392B;
    --teal: #028090;
    --border: #E2E8F5;
    --shadow: 0 4px 24px rgba(30,39,97,0.08);
    --shadow-hover: 0 8px 40px rgba(30,39,97,0.16);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── HEADER ── */
  header {
    background: var(--navy-dark);
    padding: 0;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 20px rgba(0,0,0,0.3);
  }
  .header-inner {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 14px 28px;
    max-width: 1400px;
    margin: 0 auto;
  }
  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 1.25rem;
    color: var(--white);
    white-space: nowrap;
    font-weight: 700;
  }
  .logo span { color: var(--gold); }
  .search-wrap {
    flex: 1;
    position: relative;
    max-width: 420px;
  }
  .search-wrap input {
    width: 100%;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 8px;
    padding: 8px 14px 8px 36px;
    color: white;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.875rem;
    outline: none;
    transition: border 0.2s;
  }
  .search-wrap input::placeholder { color: rgba(255,255,255,0.4); }
  .search-wrap input:focus { border-color: var(--gold); }
  .search-icon {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    color: rgba(255,255,255,0.4);
    font-size: 0.875rem;
  }
  .header-count {
    color: var(--ice);
    font-size: 0.8rem;
    white-space: nowrap;
    margin-left: auto;
  }

  /* ── LAYOUT ── */
  .app-layout {
    display: flex;
    max-width: 1400px;
    margin: 0 auto;
    min-height: calc(100vh - 56px);
  }

  /* ── SIDEBAR ── */
  .sidebar {
    width: 280px;
    flex-shrink: 0;
    background: var(--navy);
    min-height: calc(100vh - 56px);
    position: sticky;
    top: 56px;
    height: calc(100vh - 56px);
    overflow-y: auto;
    padding-bottom: 40px;
  }
  .sidebar::-webkit-scrollbar { width: 4px; }
  .sidebar::-webkit-scrollbar-track { background: transparent; }
  .sidebar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 2px; }

  .chapter-group { border-bottom: 1px solid rgba(255,255,255,0.08); }
  .chapter-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 20px;
    cursor: pointer;
    transition: background 0.15s;
    user-select: none;
  }
  .chapter-header:hover { background: rgba(255,255,255,0.06); }
  .chapter-header.active { background: rgba(244,191,95,0.15); }
  .chapter-icon { font-size: 1rem; flex-shrink: 0; }
  .chapter-title {
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--ice);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    flex: 1;
    line-height: 1.3;
  }
  .chapter-count {
    font-size: 0.7rem;
    background: rgba(255,255,255,0.1);
    color: rgba(255,255,255,0.6);
    border-radius: 10px;
    padding: 1px 7px;
  }
  .chapter-arrow {
    color: rgba(255,255,255,0.3);
    font-size: 0.7rem;
    transition: transform 0.2s;
  }
  .chapter-group.open .chapter-arrow { transform: rotate(90deg); }

  .strategy-list { display: none; }
  .chapter-group.open .strategy-list { display: block; }

  .strategy-item {
    padding: 7px 20px 7px 44px;
    font-size: 0.78rem;
    color: rgba(255,255,255,0.65);
    cursor: pointer;
    transition: all 0.15s;
    border-left: 2px solid transparent;
    line-height: 1.4;
  }
  .strategy-item:hover {
    color: white;
    background: rgba(255,255,255,0.05);
    border-left-color: rgba(244,191,95,0.5);
  }
  .strategy-item.active {
    color: var(--gold);
    background: rgba(244,191,95,0.1);
    border-left-color: var(--gold);
    font-weight: 500;
  }

  /* ── MAIN CONTENT ── */
  .main {
    flex: 1;
    padding: 32px 36px;
    min-width: 0;
  }

  /* ── WELCOME ── */
  .welcome {
    text-align: center;
    padding: 60px 40px;
  }
  .welcome h1 {
    font-family: 'Playfair Display', serif;
    font-size: 3rem;
    color: var(--navy);
    margin-bottom: 12px;
    line-height: 1.2;
  }
  .welcome h1 span { color: var(--gold-dark); }
  .welcome p { color: var(--muted); font-size: 1.1rem; max-width: 560px; margin: 0 auto 32px; line-height: 1.7; }
  .welcome-stats {
    display: flex;
    gap: 24px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .stat-box {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 28px;
    text-align: center;
    box-shadow: var(--shadow);
  }
  .stat-num {
    font-family: 'Playfair Display', serif;
    font-size: 2.5rem;
    color: var(--navy);
    font-weight: 900;
    line-height: 1;
  }
  .stat-label { font-size: 0.8rem; color: var(--muted); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.06em; }

  /* chapter grid on welcome */
  .chapter-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 12px;
    margin-top: 40px;
    text-align: left;
  }
  .chapter-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 18px;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: var(--shadow);
  }
  .chapter-card:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow-hover);
    border-color: var(--navy);
  }
  .chapter-card-icon { font-size: 1.4rem; margin-bottom: 6px; }
  .chapter-card-title { font-weight: 600; font-size: 0.85rem; color: var(--navy); }
  .chapter-card-count { font-size: 0.75rem; color: var(--muted); margin-top: 2px; }

  /* ── STRATEGY DETAIL ── */
  .strategy-view { display: none; }
  .strategy-view.visible { display: block; }

  .strategy-header {
    background: var(--navy);
    border-radius: 14px;
    padding: 28px 32px;
    margin-bottom: 24px;
    position: relative;
    overflow: hidden;
  }
  .strategy-header::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 6px;
    background: var(--gold);
  }
  .strategy-chapter-label {
    font-size: 0.75rem;
    color: var(--ice);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 8px;
    padding-left: 6px;
  }
  .strategy-title {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    color: var(--white);
    line-height: 1.2;
    padding-left: 6px;
  }
  .strategy-tags {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 14px;
    padding-left: 6px;
  }
  .tag {
    font-size: 0.72rem;
    padding: 3px 10px;
    border-radius: 20px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .tag-bullish { background: rgba(26,158,92,0.25); color: #5fdb9e; }
  .tag-bearish { background: rgba(192,57,43,0.25); color: #f0836e; }
  .tag-neutral { background: rgba(2,128,144,0.25); color: #69d6e8; }
  .tag-income { background: rgba(244,191,95,0.25); color: var(--gold); }
  .tag-gain { background: rgba(202,219,252,0.25); color: var(--ice); }
  .tag-hedge { background: rgba(100,116,155,0.25); color: #b0bcd8; }
  .tag-arb { background: rgba(200,100,255,0.2); color: #cc99ff; }
  .tag-ml { background: rgba(255,165,0,0.2); color: #ffa500; }

  /* card grid */
  .cards-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 18px;
    margin-bottom: 24px;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 22px 24px;
    box-shadow: var(--shadow);
  }
  .card-full { grid-column: 1 / -1; }
  .card h3 {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin-bottom: 12px;
    font-weight: 600;
  }

  /* explanation */
  .explanation-text {
    font-size: 0.95rem;
    line-height: 1.8;
    color: var(--text);
  }
  .explanation-text p { margin-bottom: 10px; }
  .highlight-box {
    background: linear-gradient(135deg, rgba(30,39,97,0.05), rgba(2,128,144,0.05));
    border-left: 3px solid var(--teal);
    border-radius: 0 8px 8px 0;
    padding: 14px 18px;
    margin: 14px 0;
    font-size: 0.9rem;
    color: var(--text);
    line-height: 1.7;
  }

  /* P&L metrics */
  .pnl-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
    gap: 12px;
  }
  .pnl-item {
    background: var(--bg);
    border-radius: 8px;
    padding: 12px;
    text-align: center;
  }
  .pnl-label { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
  .pnl-value {
    font-family: 'DM Mono', monospace;
    font-size: 0.95rem;
    font-weight: 600;
    margin-top: 4px;
  }
  .pnl-green { color: var(--green); }
  .pnl-red { color: var(--red); }
  .pnl-blue { color: var(--navy); }
  .pnl-gold { color: var(--gold-dark); }

  /* step list */
  .steps { list-style: none; counter-reset: step; }
  .steps li {
    counter-increment: step;
    display: flex;
    gap: 14px;
    margin-bottom: 14px;
    font-size: 0.9rem;
    line-height: 1.6;
    color: var(--text);
  }
  .steps li::before {
    content: counter(step);
    background: var(--navy);
    color: white;
    font-size: 0.72rem;
    font-weight: 700;
    min-width: 24px;
    height: 24px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    margin-top: 2px;
  }

  /* risk / reward bar */
  .risk-bar-wrap { margin-top: 8px; }
  .risk-bar-label { display: flex; justify-content: space-between; font-size: 0.75rem; color: var(--muted); margin-bottom: 4px; }
  .risk-bar {
    height: 8px;
    background: var(--border);
    border-radius: 4px;
    overflow: hidden;
    margin-bottom: 10px;
  }
  .risk-bar-fill { height: 100%; border-radius: 4px; transition: width 0.6s ease; }
  .risk-fill { background: linear-gradient(90deg, var(--green), var(--red)); }
  .reward-fill { background: linear-gradient(90deg, var(--navy), var(--teal)); }

  /* CHART */
  canvas { max-width: 100%; }
  .chart-wrap {
    position: relative;
    height: 240px;
    padding-top: 8px;
  }

  /* examples */
  .example-box {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px 18px;
    font-size: 0.875rem;
    line-height: 1.7;
    color: var(--text);
  }
  .example-box strong { color: var(--navy); }

  /* nav buttons */
  .nav-btns {
    display: flex;
    gap: 12px;
    margin-top: 28px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
  }
  .btn {
    padding: 9px 20px;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.875rem;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: all 0.2s;
  }
  .btn-primary { background: var(--navy); color: white; }
  .btn-primary:hover { background: var(--navy-dark); transform: translateY(-1px); }
  .btn-secondary { background: var(--border); color: var(--text); }
  .btn-secondary:hover { background: #d0d8ee; }

  /* search results */
  .search-results {
    background: var(--navy-dark);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    position: absolute;
    top: calc(100% + 6px);
    left: 0;
    right: 0;
    max-height: 340px;
    overflow-y: auto;
    z-index: 200;
    display: none;
  }
  .search-results.visible { display: block; }
  .search-result-item {
    padding: 10px 16px;
    cursor: pointer;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    transition: background 0.1s;
  }
  .search-result-item:hover { background: rgba(255,255,255,0.06); }
  .search-result-name { font-size: 0.85rem; color: white; font-weight: 500; }
  .search-result-chapter { font-size: 0.72rem; color: var(--ice); margin-top: 1px; }

  /* divider */
  .section-divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 24px 0 16px;
  }
  .section-divider span { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); font-weight: 600; white-space: nowrap; }
  .section-divider::before, .section-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  @media (max-width: 900px) {
    .sidebar { display: none; }
    .main { padding: 20px; }
    .cards-grid { grid-template-columns: 1fr; }
    .welcome h1 { font-size: 2rem; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">151 <span>Trading Strategies</span></div>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="Search strategies…" autocomplete="off">
      <div class="search-results" id="searchResults"></div>
    </div>
    <div class="header-count" id="headerCount">151 strategies · 20 asset classes</div>
  </div>
</header>

<div class="app-layout">
  <nav class="sidebar" id="sidebar"></nav>
  <main class="main">
    <div id="welcomeView">
      <div class="welcome">
        <h1>151 <span>Trading Strategies</span></h1>
        <p>An interactive guide to every major trading strategy across 20 asset classes — explained in plain English with payoff diagrams and real-world examples.</p>
        <div class="welcome-stats">
          <div class="stat-box"><div class="stat-num">151</div><div class="stat-label">Strategies</div></div>
          <div class="stat-box"><div class="stat-num">20</div><div class="stat-label">Asset Classes</div></div>
          <div class="stat-box"><div class="stat-num">550+</div><div class="stat-label">Formulas</div></div>
          <div class="stat-box"><div class="stat-num">2018</div><div class="stat-label">Published</div></div>
        </div>
        <div class="chapter-grid" id="chapterGrid"></div>
      </div>
    </div>
    <div class="strategy-view" id="strategyView"></div>
  </main>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════════════════════════════
const chapters = [
  {
    id:'options', icon:'⚡', title:'Options', strategies:[
      {
        id:'covered-call', name:'Covered Call',
        tags:['income','neutral→bullish'],
        outlook:'Neutral to Bullish',
        summary:'Own a stock and sell a call option above the current price. You collect the option premium as income, but you cap your upside at the strike price.',
        howItWorks:[
          'Buy (or already own) 100 shares of a stock at price S₀',
          'Sell 1 call option with strike K > S₀, collecting premium C',
          'If stock stays below K at expiry: keep the premium, keep the stock',
          'If stock rises above K: shares get called away at K — you still keep the premium',
          'Repeat monthly to generate consistent income'
        ],
        example:'You own 100 shares of Apple at $180. You sell a $190 call for $3 premium ($300 total). If Apple stays below $190, you keep $300. If Apple rises to $200, your shares are sold at $190 — you made $10/share + $3 premium = $13/share profit.',
        metrics:{ maxProfit:'K − S₀ + C (capped)', maxLoss:'S₀ − C (stock falls to zero)', breakeven:'S₀ − C' },
        payoffType:'covered-call',
        risk:3, reward:4,
        bestFor:'Existing stockholders seeking income in flat/slow-rising markets'
      },
      {
        id:'protective-put', name:'Protective Put',

        summary:'Own a stock and buy a put option as insurance against a drop. Think of it as car insurance — you pay a premium to limit your downside loss.',
        howItWorks:[
          'Own 100 shares of stock at S₀',
          'Buy 1 put option with strike K ≤ S₀, paying premium D',
          'If stock rises: profit from share appreciation, lose only the premium D',
          'If stock falls below K: put option gains value, offsetting losses below K',
          'Maximum loss is capped at (S₀ − K + D)'
        ],
        example:'You own Tesla at $250/share. You buy a $230 put for $8 premium. If Tesla crashes to $180, your put pays $50/share — your actual loss is just $28/share (not $70). The put saved you $42/share minus the $8 premium.',
        metrics:{ maxProfit:'Unlimited (stock rises)', maxLoss:'S₀ − K + D', breakeven:'S₀ + D' },
        payoffType:'protective-put',
        risk:2, reward:8,
        bestFor:'Investors who are long a stock but worried about near-term downside'
      },
      {
        id:'bull-call-spread', name:'Bull Call Spread',
        tags:['gain','bullish'],
        outlook:'Moderately Bullish',
        summary:'Buy a lower-strike call, sell a higher-strike call. Cheaper than buying a naked call — you sacrifice some upside to reduce cost.',
        howItWorks:[
          'Buy a call option at strike K₁ (closer to current price), paying premium',
          'Sell a call option at strike K₂ > K₁ (further OTM), receiving premium',
          'Net debit = premium paid − premium received',
          'Profit when stock rises above K₁ + net debit',
          'Maximum profit achieved when stock exceeds K₂ at expiry'
        ],
        example:'SPY is at $500. Buy $505 call for $8, sell $515 call for $3. Net cost = $5. Max profit = $15 − $5 = $10. Break-even = $510. Risk = just the $5 paid. The spread caps your upside but dramatically reduces cost vs. buying the $505 call alone.',
        metrics:{ maxProfit:'K₂ − K₁ − D', maxLoss:'D (premium paid)', breakeven:'K₁ + D' },
        payoffType:'bull-call-spread',
        risk:2, reward:5,
        bestFor:'When you\'re bullish but want to reduce options cost'
      },
      {
        id:'bear-put-spread', name:'Bear Put Spread',
        tags:['gain','bearish'],
        outlook:'Moderately Bearish',
        summary:'Buy a higher-strike put, sell a lower-strike put. Profits if the stock falls. Lower cost than a naked put — you give up some downside reward.',
        howItWorks:[
          'Buy a put at higher strike K₁ (near current price)',
          'Sell a put at lower strike K₂ < K₁',
          'Net debit = premium paid − premium received',
          'Profit as stock drops below K₁',
          'Maximum profit when stock falls below K₂ at expiry'

        example:'Stock at $100. Buy $95 put for $6, sell $85 put for $2. Net cost = $4. Max profit = $10 − $4 = $6. Break-even = $91. Useful when you expect a moderate pullback — not a crash.',

        risk:2, reward:5,
        bestFor:'Moderately bearish view with limited downside exposure'
      },
      {
        id:'long-straddle', name:'Long Straddle',
        tags:['gain','neutral','volatility'],
        outlook:'Neutral — big move either way',
        summary:'Buy a call AND a put at the same strike. You don\'t care which direction the stock moves — you just need it to move a lot.',
        howItWorks:[
          'Buy 1 ATM call at strike K',
          'Buy 1 ATM put at strike K',
          'Total cost = call premium + put premium',
          'Profit if stock moves significantly in either direction',
          'Maximum loss = total premium paid (if stock pins at K at expiry)'
        ],
        example:'Earnings are tomorrow. Stock is at $100. Buy $100 call for $5, buy $100 put for $5. Total cost = $10. Break-even: stock must reach $90 or $110. If stock gaps to $120 on good earnings, call pays $20 — profit = $10. If it crashes to $80, put pays $20.',
        metrics:{ maxProfit:'Unlimited', maxLoss:'D (total premium)', breakevenUp:'K + D', breakevenDn:'K − D' },
        payoffType:'long-straddle',
        risk:4, reward:8,
        bestFor:'Before binary events (earnings, FDA decisions, FOMC) when big move expected'
      },
      {

          'Sell 1 ATM call at strike K, collecting premium',
          'Sell 1 ATM put at strike K, collecting premium',
          'Total credit = call premium + put premium',
          'Profit if stock stays near K until expiry',
          'Loss grows as stock moves far in either direction (unlimited risk)'
        ],
        example:'Stock at $100. Sell $100 call for $5, sell $100 put for $5. Collect $10 credit. Profit zone: stock stays between $90–$110. If stock crashes to $70, loss = $30 − $10 premium = $20. Risk is theoretically unlimited to the upside.',
        metrics:{ maxProfit:'C (total credit collected)', maxLoss:'Unlimited', breakevenUp:'K + C', breakevenDn:'K − C' },
        payoffType:'short-straddle',
        risk:9, reward:4,

// BUILD SIDEBAR & STATE
// ═══════════════════════════════════════════════════════════════════
let currentStrategy = null;
let flatList = [];
chapters.forEach(ch => ch.strategies.forEach(s => flatList.push({...s, chapterId:ch.id, chapterTitle:ch.title, chapterIcon:ch.icon})));

function buildSidebar(){
  const sb = document.getElementById('sidebar');
  sb.innerHTML = chapters.map(ch=>`
    <div class="chapter-group" id="grp-${ch.id}">
      <div class="chapter-header" onclick="toggleChapter('${ch.id}')">
        <span class="chapter-icon">${ch.icon}</span>
        <span class="chapter-title">${ch.title}</span>
        <span class="chapter-count">${ch.strategies.length}</span>
        <span class="chapter-arrow">›</span>
      </div>
      <div class="strategy-list">
        ${ch.strategies.map(s=>`<div class="strategy-item" id="item-${s.id}" onclick="showStrategy('${s.id}')">${s.name}</div>`).join('')}
      </div>
    </div>
  `).join('');
}

function toggleChapter(id){
  const grp = document.getElementById('grp-'+id);
  grp.classList.toggle('open');
}

function buildChapterGrid(){
  const grid = document.getElementById('chapterGrid');
  grid.innerHTML = chapters.map(ch=>`
    <div class="chapter-card" onclick="toggleChapter('${ch.id}');showStrategy('${ch.strategies[0].id}')">
      <div class="chapter-card-icon">${ch.icon}</div>
      <div class="chapter-card-title">${ch.title}</div>
      <div class="chapter-card-count">${ch.strategies.length} strategies</div>
    </div>
  `).join('');
}

// SHOW STRATEGY
// ═══════════════════════════════════════════════════════════════════
function showStrategy(id){
  const s = flatList.find(x=>x.id===id);
  if(!s) return;
  currentStrategy = s;

  document.getElementById('welcomeView').style.display='none';
  const sv = document.getElementById('strategyView');
  sv.classList.add('visible');

  // sidebar highlights
  document.querySelectorAll('.strategy-item').forEach(el=>el.classList.remove('active'));
  const item = document.getElementById('item-'+id);
  if(item){ item.classList.add('active'); item.scrollIntoView({block:'nearest'}); }

  // open chapter
  const grp = document.getElementById('grp-'+s.chapterId);
  if(grp && !grp.classList.contains('open')) grp.classList.add('open');

  sv.innerHTML = renderStrategy(s);
  renderChart(s);

  // nav buttons
  const idx = flatList.findIndex(x=>x.id===id);
  const prevS = flatList[idx-1];
  const nextS = flatList[idx+1];
  const nav = sv.querySelector('.nav-btns');
  if(nav){
    if(prevS) nav.querySelector('#navPrev').onclick = ()=>showStrategy(prevS.id);
    else nav.querySelector('#navPrev').disabled = true;
    if(nextS) nav.querySelector('#navNext').onclick = ()=>showStrategy(nextS.id);
    else nav.querySelector('#navNext').disabled = true;
  }
  window.scrollTo({top:0,behavior:'smooth'});
}

function renderStrategy(s){
  const tagHTML = s.tags.map(t=>{
    const cls = t==='income'?'tag-income':t==='gain'?'tag-gain':t==='bearish'?'tag-bearish':t==='bullish'?'tag-bullish':t==='neutral'?'tag-neutral':t==='hedge'?'tag-hedge':t==='arb'?'tag-arb':t==='ml'?'tag-ml':'tag-neutral';
    return `<span class="tag ${cls}">${t}</span>`;
  }).join('');

  const stepsHTML = s.howItWorks.map(step=>`<li>${step}</li>`).join('');

  const metricsHTML = Object.entries(s.metrics).map(([k,v])=>`
    <div class="pnl-item">
      <div class="pnl-label">${k.replace(/_/g,' ')}</div>
      <div class="pnl-value pnl-blue">${v}</div>
    </div>
  `).join('');

  const idx = flatList.findIndex(x=>x.id===s.id);
  const prevS = flatList[idx-1];
  const nextS = flatList[idx+1];

  return `
    <div class="strategy-header">
      <div class="strategy-chapter-label">${s.chapterIcon} ${s.chapterTitle}</div>
      <div class="strategy-title">${s.name}</div>
      <div class="strategy-tags">${tagHTML}</div>
    </div>

    <div class="cards-grid">
      <div class="card card-full">
        <h3>📋 What Is It?</h3>
        <div class="explanation-text">
          <p>${s.summary}</p>
          <div class="highlight-box"><strong>Market Outlook:</strong> ${s.outlook}</div>
        </div>
      </div>

      <div class="card">
        <h3>🔢 How It Works — Step by Step</h3>
        <ol class="steps">${stepsHTML}</ol>
      </div>

      <div class="card">
        <h3>📊 ${s.payoffType==='bar-chart'&&s.barData?s.barData.title:s.payoffType==='line-chart'&&s.lineData?s.lineData.title:'Payoff Diagram'}</h3>
        <div class="chart-wrap">
          <canvas id="mainChart"></canvas>
        </div>
      </div>

      <div class="card">
        <h3>⚖️ Key Metrics</h3>
        <div class="pnl-grid">${metricsHTML}</div>
        <div style="margin-top:18px;">
          <div class="risk-bar-wrap">
            <div class="risk-bar-label"><span>Risk Level</span><span>${s.risk}/10</span></div>
            <div class="risk-bar"><div class="risk-bar-fill risk-fill" style="width:${s.risk*10}%"></div></div>
          </div>
          <div class="risk-bar-wrap">
            <div class="risk-bar-label"><span>Potential Reward</span><span>${s.reward}/10</span></div>
            <div class="risk-bar"><div class="risk-bar-fill reward-fill" style="width:${s.reward*10}%"></div></div>
          </div>
        </div>
      </div>

      <div class="card card-full">
        <h3>💡 Real-World Example</h3>
        <div class="example-box">${s.example}</div>
      </div>

      <div class="card card-full">
        <h3>🎯 Best For</h3>
        <div class="explanation-text">${s.bestFor}</div>
      </div>
    </div>

    <div class="nav-btns">
      <button class="btn btn-secondary" id="navPrev" ${!prevS?'disabled':''}>← ${prevS?prevS.name:'Start'}</button>
      <button class="btn btn-primary" id="navNext" ${!nextS?'disabled':''}>Next: ${nextS?nextS.name:'End'} →</button>
    </div>
  `;
}

let chartInstance = null;
function renderChart(s){
  const canvas = document.getElementById('mainChart');
  if(!canvas) return;
  if(chartInstance){ chartInstance.destroy(); chartInstance=null; }

  const ctx = canvas.getContext('2d');

  if(s.payoffType==='bar-chart' && s.barData){
    const colors = s.barData.values.map(v=>v>=0?'rgba(26,158,92,0.7)':'rgba(192,57,43,0.7)');
    const borders = s.barData.values.map(v=>v>=0?'rgba(26,158,92,1)':'rgba(192,57,43,1)');
    chartInstance = new Chart(ctx,{
      type:'bar',
      data:{ labels:s.barData.labels, datasets:[{data:s.barData.values, backgroundColor:colors, borderColor:borders, borderWidth:1.5, borderRadius:4}]},
      options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>`${ctx.parsed.y > 0 ? '+' : ''}${ctx.parsed.y}`}}}, scales:{ y:{grid:{color:'rgba(0,0,0,0.06)'}, ticks:{color:'#64749B',font:{family:'DM Mono',size:11}}}, x:{grid:{display:false}, ticks:{color:'#64749B',font:{size:10},maxRotation:30}}}}
    });
  } else if(s.payoffType==='line-chart' && s.lineData){
    const palette=['#1E2761','#028090','#F4BF5F','#C0392B'];
    chartInstance = new Chart(ctx,{
      type:'line',
      data:{ labels:s.lineData.labels, datasets:s.lineData.series.map((sr,i)=>({label:sr.label, data:sr.data, borderColor:palette[i%palette.length], backgroundColor:'transparent', borderWidth:2, pointRadius:3, tension:0.3, spanGaps:true}))},
      options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{position:'top',labels:{font:{family:'DM Sans',size:11},color:'#64749B',boxWidth:12}}}, scales:{ y:{grid:{color:'rgba(0,0,0,0.06)'},ticks:{color:'#64749B',font:{family:'DM Mono',size:11}}}, x:{grid:{display:false},ticks:{color:'#64749B',font:{size:10}}}}}
    });
  } else {
    // Payoff diagrams for options
    const prices = [];
    for(let i=0;i<=100;i++) prices.push(i*2); // 0 to 200
    let payoffs = [];
    const K=100, K1=90, K2=110, K3=80, K4=120, D=10, C=10, S0=100;

    if(s.payoffType==='covered-call'){
      payoffs=prices.map(p=>Math.min(p-S0+(p>=K?K-p:0)+C, K-S0+C));
      payoffs=prices.map(p=>{ const stockPnl=p-S0; const callPnl=-(Math.max(p-K,0))+C; return stockPnl+callPnl; });
    } else if(s.payoffType==='protective-put'){
      payoffs=prices.map(p=>{ const stockPnl=p-S0; const putPnl=Math.max(K1-p,0)-D; return stockPnl+putPnl; });
    } else if(s.payoffType==='bull-call-spread'){
      payoffs=prices.map(p=>Math.max(p-K,0)-Math.max(p-K2,0)-5);
    } else if(s.payoffType==='bear-put-spread'){
      payoffs=prices.map(p=>Math.max(K-p,0)-Math.max(K1-p,0)-4);
    } else if(s.payoffType==='long-straddle'){
      payoffs=prices.map(p=>Math.max(p-K,0)+Math.max(K-p,0)-D);
    } else if(s.payoffType==='short-straddle'){
      payoffs=prices.map(p=>-(Math.max(p-K,0)+Math.max(K-p,0))+C);
    } else if(s.payoffType==='long-strangle'){
      payoffs=prices.map(p=>Math.max(p-K2,0)+Math.max(K1-p,0)-6);
    } else if(s.payoffType==='short-strangle'){
      payoffs=prices.map(p=>-(Math.max(p-K2,0)+Math.max(K1-p,0))+6);
    } else if(s.payoffType==='iron-condor'){
      payoffs=prices.map(p=>{ const ps=-(Math.max(K1-p,0)-Math.max(K3-p,0)); const cs=-(Math.max(p-K2,0)-Math.max(p-K4,0)); return ps+cs+4; });
    } else if(s.payoffType==='iron-butterfly'){
      payoffs=prices.map(p=>{ const ps=-(Math.max(K-p,0)-Math.max(K1-p,0)); const cs=-(Math.max(p-K,0)-Math.max(p-K2,0)); return ps+cs+6; });
    } else if(s.payoffType==='long-butterfly'){
      payoffs=prices.map(p=>Math.max(p-K1,0)-2*Math.max(p-K,0)+Math.max(p-K2,0)-1);
    } else if(s.payoffType==='collar'){
      payoffs=prices.map(p=>{ const s=p-S0; const put=Math.max(K1-p,0)-3; const call=-(Math.max(p-K2,0))+3; return s+put+call; });
    } else if(s.payoffType==='calendar'){
      payoffs=prices.map(p=>{ const d=Math.abs(p-K); return Math.max(5-d*0.5,-3); });
    } else if(s.payoffType==='ratio-spread'){
      payoffs=prices.map(p=>Math.max(p-K,0)-2*Math.max(p-K2,0));
    } else {
      payoffs=prices.map(()=>0);
    }

    const bgColors = payoffs.map(v=>v>=0?'rgba(26,158,92,0.1)':'rgba(192,57,43,0.1)');
    chartInstance = new Chart(ctx,{
      type:'line',
      data:{
        labels:prices,
        datasets:[
          {label:'P&L at Expiry',data:payoffs,borderColor:'#1E2761',backgroundColor:'rgba(30,39,97,0.08)',fill:true,borderWidth:2,pointRadius:0,tension:0.1},
          {label:'Break-even',data:prices.map(()=>0),borderColor:'rgba(100,116,155,0.4)',borderWidth:1,borderDash:[4,4],pointRadius:0}
        ]
      },
      options:{
        responsive:true, maintainAspectRatio:false,
        plugins:{ legend:{position:'top',labels:{font:{family:'DM Sans',size:11},color:'#64749B',boxWidth:12}}},
        scales:{
          x:{title:{display:true,text:'Stock Price at Expiry',color:'#64749B',font:{size:11}},ticks:{color:'#64749B',font:{family:'DM Mono',size:10},maxTicksLimit:11},grid:{display:false}},
          y:{title:{display:true,text:'P&L',color:'#64749B',font:{size:11}},ticks:{color:'#64749B',font:{family:'DM Mono',size:10}},grid:{color:'rgba(0,0,0,0.06)'}}
        }
      }
    });
  }
}

const searchInput = document.getElementById('searchInput');
const searchResults = document.getElementById('searchResults');

searchInput.addEventListener('input', function(){
  const q = this.value.trim().toLowerCase();
  if(q.length < 2){ searchResults.classList.remove('visible'); return; }
  const matches = flatList.filter(s=>s.name.toLowerCase().includes(q)||s.summary.toLowerCase().includes(q)||s.chapterTitle.toLowerCase().includes(q)).slice(0,10);
  if(matches.length===0){ searchResults.classList.remove('visible'); return; }
  searchResults.innerHTML = matches.map(s=>`
    <div class="search-result-item" onclick="showStrategy('${s.id}');searchInput.value='';searchResults.classList.remove('visible')">
      <div class="search-result-name">${s.name}</div>
      <div class="search-result-chapter">${s.chapterIcon} ${s.chapterTitle}</div>
    </div>
  `).join('');
  searchResults.classList.add('visible');
});

document.addEventListener('click', e=>{ if(!e.target.closest('.search-wrap')) searchResults.classList.remove('visible'); });
